h/%EC%84%B1%EC%82%B0%EC%9D%BC%EC%B6%9C%EB%B4%89", "srcs": ["https://www.instagram.com/p/DYQVv-OlsT5/?img_index=9"], "q": "ok"}, {"lat": 33.4511713, "lng": 126.9243828, "b": 8, "name": "광치기해변", "ko": "광치기해변", "cat": "Jeju", "type": "beach", "addr": "제주특별자치도 서귀포시 성산읍 고성리 224-33", "naver": "https://map.naver.com/p/search/%EA%B4%91%EC%B9%98%EA%B8%B0%ED%95%B4%EB%B3%80", "srcs": ["https://www.instagram.com/p/DYQVv-OlsT5/?img_index=9"], "q": "ok"}, {"lat": 33.2465182, "lng": 126.5679847, "b": 0, "name": "태평식당", "ko": "태평식당", "cat": "Jeju", "type": "pork bone hangover soup (haejangguk) restaurant", "addr": "제주특별자치도 서귀포시 태평로 452 1층 태평식당", "naver": "https://map.naver.com/p/search/%ED%83%9C%ED%8F%89%EC%8B%9D%EB%8B%B9", "srcs": ["https://www.instagram.com/reel/DX2pJ25TuD3/"], "q": "ok"}];
const BUCKETS = [{"name": "Meat / BBQ", "color": "#c0392b"}, {"name": "Restaurants / Eats", "color": "#e67e22"}, {"name": "Cafe / Bakery / Bread", "color": "#8e44ad"}, {"name": "Bar / Drinks / Brewery", "color": "#2980b9"}, {"name": "Stay / Hanok", "color": "#16a085"}, {"name": "Attraction / Culture", "color": "#2c3e50"}, {"name": "Activity / Outdoors", "color": "#27ae60"}, {"name": "Region / Area", "color": "#7f8c8d"}, {"name": "Other", "color": "#95a5a6"}];
const map = L.map('map').setView([36.4, 127.9], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {maxZoom:20, subdomains:'abcd', attribution:'© OpenStreetMap © CARTO'}).addTo(map);

const groups = BUCKETS.map(()=>L.layerGroup().addTo(map));
let allMarkers = [];
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

PTS.forEach(p=>{
  const col = BUCKETS[p.b].color;
  const size = p.q==='verify'?13:15;
  const icon = L.divIcon({className:'', html:`<div class="pin ${p.q==='verify'?'verify':''}" style="width:${size}px;height:${size}px;background:${col}"></div>`, iconSize:[size,size], iconAnchor:[size/2,size/2]});
  const m = L.marker([p.lat,p.lng],{icon});
  let srcLinks = (p.srcs||[]).map((u,i)=>`<a href="${esc(u)}" target="_blank">source${(p.srcs.length>1)?(' '+(i+1)):''}</a>`).join(' · ');
  let warn = p.q==='verify' ? `<div style="color:#b9770e;font-size:11px">⚠ auto-match — verify</div>` : '';
  m.bindPopup(`<b>${esc(p.name)}</b>${p.ko?(' <span style="color:#666">'+esc(p.ko)+'</span>'):''}<br>
    <span style="color:#888;font-size:11px">${esc(p.cat)}${p.type?(' · '+esc(p.type)):''}</span><br>
    ${p.addr?('<span style="font-size:12px">'+esc(p.addr)+'</span><br>'):''}
    ${warn}
    <a href="${esc(p.naver)}" target="_blank">📍 Open in Naver Map</a>${srcLinks?(' &nbsp;|&nbsp; '+srcLinks):''}`);
  m._txt = (p.name+' '+p.ko+' '+p.cat+' '+p.type).toLowerCase();
  m._b = p.b;
  m.addTo(groups[p.b]);
  allMarkers.push(m);
});

const overlays={};
BUCKETS.forEach((b,i)=>{ overlays[`<span class="lgd"><b style="background:${b.color}"></b>${b.name}</span>`]=groups[i]; });
L.control.layers(null, overlays, {collapsed:false, position:'topright'}).addTo(map);
document.getElementById('count').textContent = PTS.length + ' places · toggle categories →';

// --- Geolocation: find-my-location control ---
let meMarker=null, meCircle=null;
const LocateCtl = L.Control.extend({
  options:{position:'topleft'},
  onAdd:function(){
    const b=L.DomUtil.create('button','locbtn');
    b.innerHTML='📍'; b.title='Find my location';
    L.DomEvent.disableClickPropagation(b);
    b.onclick=()=>{ b.innerHTML='⏳';
      map.locate({setView:true, maxZoom:15, enableHighAccuracy:true, timeout:10000}); };
    this._btn=b; return b;
  }
});
map.addControl(new LocateCtl());
map.on('locationfound', e=>{
  const r=e.accuracy/2;
  if(meMarker){ meMarker.setLatLng(e.latlng);} else {
    meMarker=L.marker(e.latlng,{icon:L.divIcon({className:'',html:'<div class="me-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]}),zIndexOffset:1000}).addTo(map).bindPopup('You are here');
  }
  if(meCircle){ meCircle.setLatLng(e.latlng).setRadius(r);} else {
    meCircle=L.circle(e.latlng,{radius:r,color:'#1a73e8',fillColor:'#1a73e8',fillOpacity:.12,weight:1}).addTo(map);
  }
  document.querySelectorAll('.locbtn').forEach(b=>b.innerHTML='📍');
});
map.on('locationerror', ()=>{ document.querySelectorAll('.locbtn').forEach(b=>b.innerHTML='📍');
  alert('Could not get your location. Make sure location access is allowed in your browser.'); });

function doFilter(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  let shown=0;
  allMarkers.forEach(m=>{
    const vis = !q || m._txt.includes(q);
    const g=groups[m._b];
    if(vis){ if(!g.hasLayer(m)) g.addLayer(m); shown++; }
    else { if(g.hasLayer(m)) g.removeLayer(m); }
  });
  document.getElementById('count').textContent = (q? (shown+' / '+PTS.length):PTS.length) + ' places · toggle categories →';
}
